<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxgate AI Interface</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        #chat-box { flex-grow: 1; overflow-y: auto; background: #000000; border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .message { margin-bottom: 15px; line-height: 1.5; }
        .user-msg { color: #5e5f5e; font-weight: bold; }
        .ai-msg { color: #2e2e2e; }
        .input-area { display: flex; gap: 10px; }
        input[type="text"] { flex-grow: 1; padding: 15px; border-radius: 8px; border: 1px solid #333; background: #1e1e1e; color: white; font-size: 16px; }
        button { padding: 15px 20px; border-radius: 8px; border: none; background: #4dabf7; color: #121212; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #3bc9db; }
    </style>
</head>
<body>
    <h2 style="margin-top: 0;">⚡ Fluxgate AI Edge Gateway</h2>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="prompt" placeholder="Message the fast robot..." onkeypress="if(event.key === 'Enter') sendPrompt()" />
        <button onclick="sendPrompt()">Send</button>
    </div>

    <script>
        async function sendPrompt() {
            const input = document.getElementById("prompt");
            const chatBox = document.getElementById("chat-box");
            const promptText = input.value.trim();
            if (!promptText) return;

            // Add user message to UI
            chatBox.innerHTML += `<div class="message"><span class="user-msg">You:</span> ${promptText}</div>`;
            input.value = "";

            // Create a placeholder for the streaming AI response
            const aiMessageDiv = document.createElement("div");
            aiMessageDiv.className = "message ai-msg";
            aiMessageDiv.innerHTML = "<b>Fluxgate:</b> ";
            chatBox.appendChild(aiMessageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // Hit the local Rust proxy directly
                const response = await fetch("/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "phi4-mini",
                        messages: [{ role: "user", content: promptText }],
                        stream: true,
                        options: { num_ctx: 4096 } // Protects your 16GB RAM!
                    })
                });

                // Decode the streaming bytes dynamically
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                            const data = JSON.parse(line.slice(6));
                            if (data.choices[0].delta.content) {
                                // Append text character by character
                                aiMessageDiv.innerHTML += data.choices[0].delta.content.replace(/\n/g, '<br>');
                                chatBox.scrollTop = chatBox.scrollHeight;
                            }
                        }
                    }
                }
            } catch (err) {
                aiMessageDiv.innerHTML += `<span style="color:red;">Error: Gateway unreachable.</span>`;
            }
        }
    </script>
</body>
</html>
